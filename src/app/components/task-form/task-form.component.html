<div class="container mt-5" style="max-width: 600px;">
  <div class="card shadow border-0">
    <div class="card-header bg-primary text-white p-4 text-center rounded-top">
      <h2 class="mb-0 fw-bold">🚀 Create a New Task</h2>
      <p class="text-white-50 mb-0 mt-1">Add a record to your C# in-memory singleton array.</p>
    </div>

    <form (submit)="onSubmit()" class="card-body p-4">
      
      <div class="mb-3">
        <label for="taskTitle" class="form-label fw-semibold text-secondary">Task Title *</label>
        <input 
          type="text" 
          id="taskTitle" 
          name="taskTitle"
          class="form-control form-control-lg text-dark" 
          placeholder="e.g., Implement Angular Forms"
          [(ngModel)]="task.title" 
          required>
      </div>

      <div class="mb-3">
        <label for="taskDesc" class="form-label fw-semibold text-secondary">Description</label>
        <textarea 
          id="taskDesc" 
          name="taskDesc"
          class="form-control" 
          rows="3" 
          placeholder="What needs to be done?"
          [(ngModel)]="task.description"></textarea>
      </div>

      <div class="mb-3">
        <label for="taskDueDate" class="form-label fw-semibold text-secondary">Due Date</label>
        <input 
          type="date" 
          id="taskDueDate" 
          name="taskDueDate"
          class="form-control text-dark" 
          [(ngModel)]="task.dueDate">
      </div>

      <div class="row bg-light rounded p-3 mb-4 mx-0 border border-light-subtle">
        <div class="col-6">
          <div class="form-check form-switch">
            <input 
              class="form-check-input" 
              type="checkbox" 
              id="isImportant" 
              name="isImportant"
              [(ngModel)]="task.isImportant">
            <label class="form-check-label fw-medium text-danger" for="isImportant">⭐ Mark Priority</label>
          </div>
        </div>
        <div class="col-6">
          <div class="form-check form-switch">
            <input 
              class="form-check-input" 
              type="checkbox" 
              id="isCompleted" 
              name="isCompleted"
              [(ngModel)]="task.isCompleted">
            <label class="form-check-label fw-medium text-success" for="isCompleted">✅ Completed</label>
          </div>
        </div>
      </div>

      <div class="d-flex justify-content-end gap-2 border-top pt-3">
        <a routerLink="/" class="btn btn-outline-secondary px-4">Cancel</a>
        
        <button 
          type="submit" 
          class="btn btn-primary px-4 shadow-sm" 
          [disabled]="isSaving || !task.title.trim()">
          <span *ngIf="isSaving" class="spinner-border spinner-border-sm me-2" role="status"></span>
          {{ isSaving ? 'Saving Task...' : 'Save Task Record' }}
        </button>
      </div>

    </form>
  </div>
</div>
