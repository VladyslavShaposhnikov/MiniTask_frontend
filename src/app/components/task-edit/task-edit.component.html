<div class="container mt-5" style="max-width: 600px;">
  
  @if (isLoading) {
    <div class="text-center my-5">
      <div class="spinner-border text-primary" role="status" style="width: 3rem; height: 3rem;">
        <span class="visually-hidden">Loading Task Profile...</span>
      </div>
      <p class="mt-2 text-muted">Retrieving task record #{{taskId}} from the kitchen...</p>
    </div>
  } @else {
    <div class="card shadow border-0 animate-fade-in">
      <div class="card-header bg-secondary text-white p-4 text-center rounded-top">
        <h2 class="mb-0 fw-bold">✏️ Modifier Task #{{task.id}}</h2>
        <p class="text-white-50 mb-0 mt-1">Pushing modifications to your live backend endpoint.</p>
      </div>

      <form (submit)="onSubmit()" class="card-body p-4">
        
        <div class="mb-3">
          <label for="editTitle" class="form-label fw-semibold text-secondary">Task Title *</label>
          <input 
            type="text" 
            id="editTitle" 
            name="editTitle"
            class="form-control form-control-lg text-dark" 
            [(ngModel)]="task.title" 
            required>
        </div>

        <div class="mb-3">
          <label for="editDesc" class="form-label fw-semibold text-secondary">Description</label>
          <textarea 
            id="editDesc" 
            name="editDesc"
            class="form-control text-dark" 
            rows="3" 
            [(ngModel)]="task.description"></textarea>
        </div>

        <div class="mb-3">
          <label for="editDueDate" class="form-label fw-semibold text-secondary">Due Date</label>
          <input 
            type="date" 
            id="editDueDate" 
            name="editDueDate"
            class="form-control text-dark" 
            [(ngModel)]="task.dueDate">
        </div>

        <div class="row bg-light rounded p-3 mb-4 mx-0 border border-light-subtle">
          <div class="col-6">
            <div class="form-check form-switch">
              <input 
                class="form-check-input" 
                type="checkbox" 
                id="editImportant" 
                name="editImportant"
                [(ngModel)]="task.isImportant">
              <label class="form-check-label fw-medium text-danger" for="editImportant">⭐ Priority Status</label>
            </div>
          </div>
          <div class="col-6">
            <div class="form-check form-switch">
              <input 
                class="form-check-input" 
                type="checkbox" 
                id="editCompleted" 
                name="editCompleted"
                [(ngModel)]="task.isCompleted">
              <label class="form-check-label fw-medium text-success" for="editCompleted">✅ Mark Completed</label>
            </div>
          </div>
        </div>

        <div class="d-flex justify-content-end gap-2 border-top pt-3">
          <a routerLink="/" class="btn btn-outline-secondary px-4">Cancel Modifications</a>
          
          <button 
            type="submit" 
            class="btn btn-secondary px-4 shadow-sm" 
            [disabled]="isSaving || !task.title.trim()">
            <span *ngIf="isSaving" class="spinner-border spinner-border-sm me-2" role="status"></span>
            {{ isSaving ? 'Saving Changes...' : 'Commit Changes' }}
          </button>
        </div>

      </form>
    </div>
  }
</div>
